<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>數據統計 - MiniClinic</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #0F2443; border-bottom: 3px solid #14B8A6; padding-bottom: 8px; }
        nav { background: #0F2443; padding: 12px; border-radius: 8px; margin-bottom: 24px; }
        nav a { color: white; margin-right: 20px; text-decoration: none; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(3, 1/3); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #F8FAFC; padding: 20px; border-radius: 8px; text-align: center; border-top: 4px solid #14B8A6; }
        .stat-card h2 { margin: 0; font-size: 14px; color: #64748B; }
        .stat-card p { margin: 10px 0 0; font-size: 32px; font-weight: bold; color: #0F2443; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #E2E8F0; }
        th { background: #F1F5F9; }
    </style>
</head>
<body>
    <nav>
        <a th:href="@{/}">首頁</a>
        <a th:href="@{/doctors}">醫師清單</a>
        <a th:href="@{/appointments}">掛號記錄</a>
        <a th:href="@{/stats}">數據統計</a>
    </nav>

    <h1>營運數據統計</h1>

    <div class="grid" style="display: flex; justify-content: space-between;">
        <div class="stat-card" style="flex: 1; margin: 0 10px;">
            <h2>醫師總數</h2>
            <p th:text="${doctorCount}">0</p>
        </div>
        <div class="stat-card" style="flex: 1; margin: 0 10px;">
            <h2>病患總數</h2>
            <p th:text="${patientCount}">0</p>
        </div>
        <div class="stat-card" style="flex: 1; margin: 0 10px;">
            <h2>掛號總量</h2>
            <p th:text="${appointmentCount}">0</p>
        </div>
    </div>

    <h2>科別掛號分佈</h2>
    <table>
        <thead>
            <tr>
                <th>科別名稱</th>
                <th>掛號數量</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="stat : ${deptStats}">
                <td th:text="${stat[0]}">科別</td>
                <td th:text="${stat[1]}">0</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
