<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - MiniClinic</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 960px; margin: 40px auto; padding: 0 20px; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #14B8A6; padding-bottom: 12px; }
        h1 { color: #0F2443; margin: 0; }
        .logout-form { margin: 0; }
        .logout-form button { background: #94A3B8; color: white; padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 24px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #E2E8F0; }
        th { background: #0F2443; color: white; }
        .status-BOOKED    { color: #0369A1; font-weight: bold; }
        .status-COMPLETED { color: #15803D; font-weight: bold; }
        .status-CANCELLED { color: #9F1239; font-weight: bold; }
        
        .btn-complete { background: #10B981; color: white; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .btn-complete:hover { background: #059669; }
        .btn-cancel { background: #EF4444; color: white; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .btn-cancel:hover { background: #DC2626; }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>Dashboard</h1>
            <p>歡迎，<span th:text="${doctor.name}"></span>（<span th:text="${doctor.department}"></span>）</p>
        </div>
        <div style="display: flex; gap: 10px;">
            <a th:href="@{/password}" style="text-decoration: none; color: #14B8A6; align-self: center;">修改密碼</a>
            <form class="logout-form" th:action="@{/logout}" method="post">
                <button type="submit">登出</button>
            </form>
        </div>
    </header>

    <h2 th:text="|今日掛號：${today}|"></h2>

    <p th:if="${appointments.isEmpty()}">今日沒有掛號。</p>

    <table th:unless="${appointments.isEmpty()}">
        <thead>
            <tr>
                <th>時段</th>
                <th>病患</th>
                <th>病歷號</th>
                <th>狀態</th>
                <th>操作</th> 
            </tr>
        </thead>
        <tbody>
            <tr th:each="appt : ${appointments}">
                <td th:text="${appt.timeSlot}">AM</td>
                <td th:text="${appt.patient.name}">-</td>
                <td th:text="${appt.patient.chartNo}">-</td>
                <td>
                    <span th:text="${appt.status}" th:class="${'status-' + appt.status}">BOOKED</span>
                </td>
                <td>
                    <div th:if="${appt.status == 'BOOKED'}" style="display: flex; gap: 5px;">
                        <button th:onclick="'updateStatus(' + ${appt.apptId} + ', \'COMPLETED\')'" 
                                class="btn-complete">
                            看診完成
                        </button>
                        <button th:onclick="'updateStatus(' + ${appt.apptId} + ', \'CANCELLED\')'" 
                                class="btn-cancel">
                            取消
                        </button>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>

    <script>
        function updateStatus(appointmentId, newStatus) {
            const actionText = newStatus === 'COMPLETED' ? '完成這筆看診' : '取消這筆掛號';
            if (!confirm(`確定要${actionText}嗎？`)) return;

            fetch(`/api/appointments/${appointmentId}/status`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ status: newStatus })
            })
            .then(response => {
                if (response.ok) {
                    window.location.reload(); 
                } else {
                    return response.text().then(text => {
                        let msg = `錯誤 (HTTP ${response.status})`;
                        try {
                            const data = JSON.parse(text);
                            msg = data.message || msg;
                        } catch (e) {}
                        throw new Error(msg);
                    });
                }
            })
            .catch(error => {
                console.error("Error:", error);
                alert("錯誤：" + error.message);
            });
        }
    </script>
</body>
</html>
