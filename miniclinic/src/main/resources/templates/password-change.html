<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>修改密碼 - MiniClinic</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 400px; margin: 60px auto; padding: 0 20px; }
        .field { margin: 15px 0; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        .error { color: #dc2626; font-size: 13px; margin-top: 5px; }
        .success { background: #dcfce7; color: #166534; padding: 10px; border-radius: 4px; margin-bottom: 15px; }
        button { width: 100%; background: #14B8A6; color: white; padding: 10px; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>修改密碼</h1>
    <div class="success" th:if="${successMessage}" th:text="${successMessage}"></div>

    <form th:action="@{/password}" th:object="${passwordForm}" method="post">
        <div class="field">
            <label>舊密碼</label>
            <input type="password" th:field="*{oldPassword}">
            <div class="error" th:if="${#fields.hasErrors('oldPassword')}" th:errors="*{oldPassword}"></div>
        </div>
        <div class="field">
            <label>新密碼 (至少8碼)</label>
            <input type="password" th:field="*{newPassword}">
            <div class="error" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></div>
        </div>
        <div class="field">
            <label>確認新密碼</label>
            <input type="password" th:field="*{confirmPassword}">
            <div class="error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
        </div>
        <button type="submit">更新密碼</button>
    </form>
    <p style="text-align: center; margin-top: 20px;">
        <a th:href="@{/dashboard}">← 返回 Dashboard</a>
    </p>
</body>
</html>
